<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · Klyo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#061018" stroke-width="2.2" stroke-linecap="round"><path d="M2 12h4l2 7 4-14 3 9 2-5h5"/></svg>
      </div>
      <div class="brand-name">Kly<span>o</span></div>
    </div>

    <h1 id="formTitle">Welcome back</h1>
    <p class="sub" id="formSub">Sign in to your workspace</p>

    <button type="button" class="btn" id="googleBtn" style="width:100%; padding:10px; margin-bottom:14px; display:flex; align-items:center; justify-content:center; gap:10px;">
      <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.2 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.5 6.2 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 13.9-5.4l-6.4-5.4C29.5 34.7 26.9 36 24 36c-5.3 0-9.7-3.4-11.3-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.4 5.4C41.4 35.6 44 30.3 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Continue with Google
    </button>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
      <div style="flex:1; height:1px; background:var(--border-soft);"></div>
      <span class="muted" style="font-size:11.5px;">or</span>
      <div style="flex:1; height:1px; background:var(--border-soft);"></div>
    </div>

    <form id="authForm">
      <div class="field hidden" id="nameField">
        <label for="name">Your name</label>
        <input id="name" type="text" autocomplete="name" placeholder="Jordan Avery" />
      </div>

      <div class="field hidden" id="signupModeField">
        <div style="display:flex; gap:8px;">
          <button type="button" class="btn btn-sm btn-primary" id="createModeBtn" style="flex:1;">Create a business</button>
          <button type="button" class="btn btn-sm btn-ghost" id="joinModeBtn" style="flex:1;">I have an invite code</button>
        </div>
      </div>

      <div class="field hidden" id="workspaceNameField">
        <label for="workspaceName">Your business name</label>
        <input id="workspaceName" type="text" placeholder="Lawson Hair Studio" />
      </div>

      <div class="field hidden" id="inviteCodeField">
        <label for="inviteCode">Invite code</label>
        <input id="inviteCode" type="text" placeholder="A1B2C3D4E5" style="text-transform:uppercase;" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@business.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <div class="form-error" id="formError"></div>
      <button class="btn btn-primary" type="submit" style="width:100%; padding:11px;" id="submitBtn">Sign in</button>
    </form>

    <p class="auth-switch">
      <span id="switchPrompt">New here?</span>
      <a href="#" id="switchLink">Create an account</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  let mode = "login";       // "login" | "register"
  let signupMode = "create"; // "create" | "join" (only relevant when mode === "register")

  const els = {
    title: document.getElementById("formTitle"),
    sub: document.getElementById("formSub"),
    nameField: document.getElementById("nameField"),
    name: document.getElementById("name"),
    signupModeField: document.getElementById("signupModeField"),
    createModeBtn: document.getElementById("createModeBtn"),
    joinModeBtn: document.getElementById("joinModeBtn"),
    workspaceNameField: document.getElementById("workspaceNameField"),
    workspaceName: document.getElementById("workspaceName"),
    inviteCodeField: document.getElementById("inviteCodeField"),
    inviteCode: document.getElementById("inviteCode"),
    email: document.getElementById("email"),
    password: document.getElementById("password"),
    error: document.getElementById("formError"),
    submitBtn: document.getElementById("submitBtn"),
    switchPrompt: document.getElementById("switchPrompt"),
    switchLink: document.getElementById("switchLink"),
    form: document.getElementById("authForm"),
    googleBtn: document.getElementById("googleBtn"),
  };

  function setSignupMode(next) {
    signupMode = next;
    const creating = signupMode === "create";
    els.createModeBtn.className = `btn btn-sm ${creating ? "btn-primary" : "btn-ghost"}`;
    els.joinModeBtn.className = `btn btn-sm ${!creating ? "btn-primary" : "btn-ghost"}`;
    els.workspaceNameField.classList.toggle("hidden", !creating);
    els.inviteCodeField.classList.toggle("hidden", creating);
  }

  function setMode(next) {
    mode = next;
    els.error.textContent = "";
    if (mode === "login") {
      els.title.textContent = "Welcome back";
      els.sub.textContent = "Sign in to your workspace";
      els.nameField.classList.add("hidden");
      els.signupModeField.classList.add("hidden");
      els.workspaceNameField.classList.add("hidden");
      els.inviteCodeField.classList.add("hidden");
      els.submitBtn.textContent = "Sign in";
      els.switchPrompt.textContent = "New here?";
      els.switchLink.textContent = "Create an account";
    } else {
      els.title.textContent = "Create your account";
      els.sub.textContent = "Start a new business, or join one with an invite code";
      els.nameField.classList.remove("hidden");
      els.signupModeField.classList.remove("hidden");
      setSignupMode("create");
      els.submitBtn.textContent = "Create account";
      els.switchPrompt.textContent = "Already have an account?";
      els.switchLink.textContent = "Sign in instead";
    }
  }

  els.switchLink.addEventListener("click", (e) => {
    e.preventDefault();
    setMode(mode === "login" ? "register" : "login");
  });
  els.createModeBtn.addEventListener("click", () => setSignupMode("create"));
  els.joinModeBtn.addEventListener("click", () => setSignupMode("join"));

  els.form.addEventListener("submit", async (e) => {
    e.preventDefault();
    els.error.textContent = "";
    els.submitBtn.disabled = true;

    try {
      const payload = { email: els.email.value.trim(), password: els.password.value };
      let result;
      if (mode === "login") {
        result = await API.post("/auth/login", payload);
      } else {
        payload.name = els.name.value.trim();
        if (!payload.name) throw new Error("Please enter your name.");
        if (signupMode === "create") {
          payload.workspace_name = els.workspaceName.value.trim();
          if (!payload.workspace_name) throw new Error("Please enter your business name.");
        } else {
          payload.invite_code = els.inviteCode.value.trim();
          if (!payload.invite_code) throw new Error("Please enter your invite code.");
        }
        result = await API.post("/auth/register", payload);
      }
      API.setToken(result.token);
      API.setUser(result.user);
      window.location.href = "/index.html";
    } catch (err) {
      els.error.textContent = err.message;
    } finally {
      els.submitBtn.disabled = false;
    }
  });

  els.googleBtn.addEventListener("click", async () => {
    els.error.textContent = "";
    const params = new URLSearchParams();
    if (mode === "register" && signupMode === "join") {
      const code = els.inviteCode.value.trim();
      if (!code) { els.error.textContent = "Enter your invite code first, then continue with Google."; return; }
      params.set("mode", "join");
      params.set("invite_code", code);
    } else if (mode === "register") {
      const name = els.workspaceName.value.trim();
      if (!name) { els.error.textContent = "Enter your business name first, then continue with Google."; return; }
      params.set("mode", "create");
      params.set("workspace_name", name);
    } else {
      params.set("mode", "create"); // ignored unless this turns out to be a brand-new account
    }

    els.googleBtn.disabled = true;
    try {
      const { url } = await API.get(`/auth/google/start?${params}`);
      window.location.href = url;
    } catch (err) {
      els.error.textContent = err.message;
      els.googleBtn.disabled = false;
    }
  });

  // Coming back from Google: either a one-time token to sign in with, or
  // an error to show. Either way, clean the URL up afterward.
  async function handleGoogleRedirect() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("google_token");
    const error = params.get("google_error");

    if (token) {
      API.setToken(token);
      try {
        const { user } = await API.get("/auth/me");
        API.setUser(user);
        window.location.href = "/index.html";
      } catch {
        API.clearToken();
        els.error.textContent = "Could not complete Google sign-in. Please try again.";
      }
      return true; // handled — the "already signed in" check below must not also run
    }
    if (error) {
      const messages = {
        cancelled: "Google sign-in was cancelled.",
        bad_invite: "That invite code doesn't match any workspace.",
        seat_limit: "That workspace is at its seat limit on its current plan.",
        no_email: "Your Google account didn't share an email address.",
      };
      els.error.textContent = messages[error] || "Could not sign in with Google. Please try again.";
      window.history.replaceState({}, "", window.location.pathname);
    }
    return false;
  }

  (async function boot() {
    const handledByGoogle = await handleGoogleRedirect();
    // Only check "already signed in" if the block above didn't already
    // decide where this page is going — otherwise this fires a second,
    // premature redirect before the real auth check has finished.
    if (!handledByGoogle && API.token()) {
      window.location.href = "/index.html";
    }
  })();
</script>
</body>
</html>
